    <script>
        let currentDocumentMode = 'internal'; 
        let supabaseClient = null;

        // ลิงก์โลโก้เริ่มต้น (ตราพระเกี้ยว) สำหรับแสดงผลก่อนอัพโหลด
        let currentLogoUrl = "https://www.chula.ac.th/wp-content/uploads/2018/01/chula-logo-th.png";

        let textParagraphs = [
            { label: 'ย่อหน้าที่ 1', text: 'ด้วย บริษัท สคูลดิโอ จำกัด ได้จัดโครงการอบรมเชิงปฏิบัติการ หลักสูตร AI Automation Transformation รุ่นที่ 3 ในรูปแบบการเรียนออนไลน์ควบคู่กับการจัด Workshop เชิงปฏิบัติการ ณ สถานที่ของบริษัท สคูลดิโอ จำกัด โดยเรียนออนไลน์ตั้งแต่วันที่ 4 กรกฎาคม 2569 และเข้าร่วม Workshop เชิงปฏิบัติการในวันเสาร์ที่ 11 กรกฎาคม 2569 วันเสาร์ที่ 18 กรกฎาคม 2569 และวันเสาร์ที่ 26 กรกฎาคม 2569 วัตถุประสงค์เพื่อเสริมสร้างความรู้และทักษะด้านการออกแบบและพัฒนาระบบ AI Automation เพื่อนำมาประยุกต์ใช้ในกระบวนการทำงานขององค์กร อันจะช่วยเพิ่มประสิทธิภาพในการทำงาน ลดระยะเวลาในการดำเนินงาน และลดโอกาสการเกิดข้อผิดพลาดจากการปฏิบัติงานของบุคลากร' },
            { label: 'ย่อหน้าที่ 2', text: 'โครงการดังกล่าวมุ่งเน้นการพัฒนาความรู้ความเข้าใจด้าน AI Automation และ Workflow Automation เพื่อให้บุคลากรสามารถวิเคราะห์และคัดเลือกกระบวนการทำงานที่เหมาะสมในการนำเทคโนโลยี AI มาใช้งาน ตลอดจนสามารถสร้างต้นแบบของระบบ Automation ที่สามารถนำไปใช้งานจริงภายในหน่วยงาน และยกระดับทักษะของบุคลากรให้สอดคล้องและรองรับการเปลี่ยนแปลงด้านเทคโนโลยีและนโยบายดิจิทัลขององค์กร (รายละเอียดตามเอกสารแนบ)' },
            { label: 'ย่อหน้าที่ 3', text: 'จึงเรียนมาเพื่อโปรดพิจารณาอนุมัติจัดตั้งโครงการและงบประมาณสนับสนุนดังกล่าวด้วย จะเป็นพระคุณยิ่ง' }
        ];

        // ฟังก์ชันโหลดข้อมูล Supabase อัตโนมัติจาก LocalStorage ถ้ามีอยู่แล้ว
        window.addEventListener('DOMContentLoaded', () => {
            const savedUrl = localStorage.getItem('sb_url');
            const savedKey = localStorage.getItem('sb_key');
            if (savedUrl && savedKey) {
                document.getElementById('supabase-url').value = savedUrl;
                document.getElementById('supabase-key').value = savedKey;
                initializeSupabase(savedUrl, savedKey);
            }
        });

        // เปิดตัวเชื่อมต่อ Supabase
        function initializeSupabase(u, k) {
            const url = u || document.getElementById('supabase-url').value.trim();
            const key = k || document.getElementById('supabase-key').value.trim();
            
            if (!url || !key) {
                alert("กรุณากรอกข้อมูลเชื่อมต่อให้ครบถ้วน");
                return;
            }

            try {
                supabaseClient = supabase.createClient(url, key);
                localStorage.setItem('sb_url', url);
                localStorage.setItem('sb_key', key);
                alert("เชื่อมต่อฐานข้อมูล Supabase สำเร็จ!");
                setupUploader();
            } catch (err) {
                alert("การเชื่อมต่อล้มเหลว กรุณาตรวจสอบอีกครั้ง: " + err.message);
            }
        }

        // ตั้งค่าตัวรับการอัพโหลดรูปภาพ
        function setupUploader() {
            const fileInput = document.getElementById('logo-uploader');
            fileInput.addEventListener('change', async (e) => {
                if (!supabaseClient) {
                    alert("กรุณาเชื่อมต่อ Supabase สำเร็จก่อนทำการอัพโหลดโลโก้");
                    fileInput.value = '';
                    return;
                }

                const file = e.target.files[0];
                if (!file) return;

                const statusDiv = document.getElementById('upload-status');
                statusDiv.innerText = "กำลังอัปโหลด...";

                // ตั้งชื่อไฟล์ไม่ให้ซ้ำด้วย timestamp
                const fileExt = file.name.split('.').pop();
                const fileName = `logo_${Date.now()}.${fileExt}`;
                const filePath = `${fileName}`;

                try {
                    // ทำการอัพโหลดไฟล์ไปที่ bucket 'logos' ใน Supabase
                    const { data, error } = await supabaseClient.storage
                        .from('logos')
                        .upload(filePath, file);

                    if (error) throw error;

                    // ดึง public URL ของไฟล์ที่อัพโหลดขึ้นไป
                    const { data: urlData } = supabaseClient.storage
                        .from('logos')
                        .getPublicUrl(filePath);

                    currentLogoUrl = urlData.publicUrl;
                    statusDiv.innerHTML = `✓ อัปโหลดและแชร์ลิงก์สำเร็จ! <a href="${currentLogoUrl}" target="_blank" class="underline text-pink-600">ดูรูปภาพออนไลน์</a>`;
                    processRealtimePreview();

                } catch (err) {
                    statusDiv.innerText = "อัปโหลดล้มเหลว: " + err.message;
                    console.error(err);
                }
            });
        }

        function changeMode(modeSelection) {
            currentDocumentMode = modeSelection;
            const btnInternal = document.getElementById('toggle-internal');
            const btnExternal = document.getElementById('toggle-external');
            const fieldsInternal = document.getElementById('wrapper-internal-fields');
            const fieldsExternal = document.getElementById('wrapper-external-fields');
            const footerExternal = document.getElementById('wrapper-external-footer');
            const wrapperThrough = document.getElementById('wrapper-through-field');

            if (modeSelection === 'internal') {
                btnInternal.className = "py-3 px-4 rounded-lg font-bold text-base transition bg-white text-slate-800 shadow-sm cursor-pointer";
                btnExternal.className = "py-3 px-4 rounded-lg font-bold text-base transition text-slate-600 hover:text-slate-900 cursor-pointer";
                fieldsInternal.classList.remove('hidden');
                fieldsExternal.classList.add('hidden');
                footerExternal.classList.add('hidden');
                wrapperThrough.classList.remove('hidden');
            } else {
                btnInternal.className = "py-3 px-4 rounded-lg font-bold text-base transition text-slate-600 hover:text-slate-900 cursor-pointer";
                btnExternal.className = "py-3 px-4 rounded-lg font-bold text-base transition bg-white text-slate-800 shadow-sm cursor-pointer";
                fieldsInternal.classList.add('hidden');
                fieldsExternal.classList.remove('hidden');
                footerExternal.classList.remove('hidden');
                wrapperThrough.classList.add('hidden');
            }
            processRealtimePreview();
        }

        function buildParagraphControls() {
            const container = document.getElementById('box-paragraphs-inputs');
            container.innerHTML = '';
            textParagraphs.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "space-y-1 bg-slate-50 p-3 rounded-lg border border-slate-200";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-slate-500">${item.label}</span>
                        ${index > 0 ? `<button onclick="removeParagraphField(${index})" class="text-xs text-red-500 hover:underline">ลบ</button>` : ''}
                    </div>
                    <textarea class="w-full border border-slate-300 rounded-lg p-2.5 text-base outline-none bg-white text-slate-800 h-24" oninput="updateParagraphText(${index}, this.value)">${item.text}</textarea>
                `;
                container.appendChild(div);
            });
        }

        function addNewParagraphField() {
            textParagraphs.push({ label: `ย่อหน้าที่ ${textParagraphs.length + 1}`, text: '' });
            buildParagraphControls();
            processRealtimePreview();
        }

        function removeParagraphField(index) {
            textParagraphs.splice(index, 1);
            textParagraphs.forEach((p, idx) => p.label = `ย่อหน้าที่ ${idx + 1}`);
            buildParagraphControls();
            processRealtimePreview();
        }

        function updateParagraphText(index, value) {
            textParagraphs[index].text = value;
            processRealtimePreview();
        }

        function processRealtimePreview() {
            const container = document.getElementById('preview-container');
            container.innerHTML = ''; 

            const docId = document.getElementById('data-doc-id').value;
            const docDate = document.getElementById('data-date').value;
            const subject = document.getElementById('data-subject').value;
            const learn = document.getElementById('data-learn').value;
            const through = document.getElementById('data-through').value;
            const dept = document.getElementById('data-dept').value;
            const phone = document.getElementById('data-phone').value;
            const fax = document.getElementById('data-fax').value;
            const ref = document.getElementById('data-ref').value;
            const attach = document.getElementById('data-attach').value;
            const signName = document.getElementById('data-sign-name').value;
            const signPosition = document.getElementById('data-sign-position').value;
            const fDeptMain = document.getElementById('footer-dept-main').value;
            const fDeptSub = document.getElementById('footer-dept-sub').value;
            const fEmail = document.getElementById('footer-email').value;

            const page1 = document.createElement('div');
            page1.className = 'a4-page';
            page1.id = 'page-render-area';
            
            let throughRowHTML = '';
            if (currentDocumentMode === 'internal' && through.trim() !== '') {
                throughRowHTML = `
                    <tr style="height: 35px;">
                        <td style="vertical-align: bottom; border: none;" colspan="2">
                            <div style="padding-left: 3px; display: inline-block;">
                                <span style="font-size: 16pt; font-weight: bold;">ผ่าน</span>&nbsp;&nbsp;<span style="font-size: 16pt; font-weight: normal;">${through}</span>
                            </div>
                        </td>
                    </tr>`;
            }

            let headerHTML = '';
            if (currentDocumentMode === 'internal') {
                headerHTML = `
                    <div style="position: relative; width: 100%; height: 2.0cm; margin-bottom: 5mm;">
                        <img src="${currentLogoUrl}" style="position: absolute; left: 0; top: 0; height: 1.8cm; width: auto; display: block;" />
                        <div style="font-size: 29pt; font-weight: bold; text-align: center; width: 100%; padding-top: 1mm;">บันทึกข้อความ</div>
                    </div>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 5mm; font-family: 'TH SarabunPSK'; border: none;">
                        <tr style="height: 35px;">
                            <td colspan="2" style="vertical-align: bottom; border: none; text-align: left;">
                                <span style="font-size: 20pt; font-weight: bold;">ส่วนงาน</span>&nbsp;&nbsp;<span style="font-size: 16pt; font-weight: normal;">${dept}</span>&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-size: 16pt; font-weight: bold;">โทร.</span>&nbsp;<span style="font-size: 16pt; font-weight: normal;">${phone}</span>
                            </td>
                        </tr>
                        <tr style="height: 35px;">
                            <td style="width: 50%; vertical-align: bottom; border: none;"><span style="font-size: 20pt; font-weight: bold;">ที่</span>&nbsp;&nbsp;<span style="font-size: 16pt; font-weight: normal;">${docId}</span></td>
                            <td style="width: 50%; text-align: left; vertical-align: bottom; border: none;"><span style="font-size: 16pt; font-weight: bold;">วันที่</span>&nbsp;&nbsp;<span style="font-size: 16pt; font-weight: normal;">${docDate}</span></td>
                        </tr>
                        <tr style="height: 35px;"><td style="vertical-align: bottom; border: none;" colspan="2"><span style="font-size: 20pt; font-weight: bold;">เรื่อง</span>&nbsp;&nbsp;<span style="font-size: 16pt; font-weight: normal;">${subject}</span></td></tr>
                        <tr style="height: 35px;"><td style="vertical-align: bottom; border: none;" colspan="2"><span style="font-size: 16pt; font-weight: bold;">เรียน</span>&nbsp;&nbsp;<span style="font-size: 16pt; font-weight: normal;">${learn}</span></td></tr>
                        ${throughRowHTML}
                    </table>`;
            } else {
                headerHTML = `
                    <div style="width: 100%; text-align: center; margin-bottom: 5mm;">
                        <img src="${currentLogoUrl}" style="height: 3.0cm; width: auto; margin: 0 auto; display: block;" />
                    </div>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 4mm; font-family: 'TH SarabunPSK'; border: none;">
                        <tr><td style="width: 50%; vertical-align: top; border: none; font-size: 16pt;"><span style="font-weight: bold;">ที่</span>&nbsp;&nbsp;<span style="font-weight: normal;">${docId}</span></td><td style="width: 50%; text-align: right; vertical-align: top; border: none; font-size: 16pt;">จุฬาลงกรณ์มหาวิทยาลัย<br>ถนนพญาไท กทม. 10330</td></tr>
                    </table>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 5mm; font-family: 'TH SarabunPSK'; border: none;">
                        <tr><td style="width: 50%; border: none;"></td><td style="width: 50%; text-align: left; vertical-align: bottom; font-size: 16pt;">${docDate}</td></tr>
                    </table>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 5mm; font-family: 'TH SarabunPSK'; border: none;">
                        <tr style="height: 28px;"><td style="width: 18%; vertical-align: top; border: none; font-size: 16pt; font-weight: bold;">เรื่อง</td><td style="width: 82%; vertical-align: top; border: none; font-size: 16pt;">${subject}</td></tr>
                        <tr style="height: 28px;"><td style="vertical-align: top; border: none; font-size: 16pt; font-weight: bold;">เรียน</td><td style="width: 82%; vertical-align: top; border: none; font-size: 16pt;">${learn}</td></tr>
                        <tr style="height: 28px;"><td style="vertical-align: top; border: none; font-size: 16pt; font-weight: bold;">อ้างถึง</td><td style="width: 82%; vertical-align: top; border: none; font-size: 16pt;">${ref}</td></tr>
                        <tr style="height: 28px;"><td style="vertical-align: top; border: none; font-size: 16pt; font-weight: bold;">สิ่งที่ส่งมาด้วย</td><td style="width: 82%; vertical-align: top; border: none; font-size: 16pt;">${attach}</td></tr>
                    </table>`;
            }

            let pHTML = '';
            textParagraphs.forEach(p => {
                pHTML += `<p class="thai-justify" style="margin: 0 0 16pt 0; text-indent: 2.5cm; font-family: 'TH SarabunPSK'; font-size: 16pt; line-height: 1.25;">${p.text}</p>`;
            });

            let signatureHTML = '';
            if (currentDocumentMode === 'internal') {
                signatureHTML = `
                    <div class="page-break-element" style="margin-top: 45px; font-family: 'TH SarabunPSK'; color: black; float: right; width: 50%; text-align: center;">
                        <p style="margin: 0; font-size: 16pt;">( ${signName} )</p>
                        <p style="margin: 4px 0 0 0; font-size: 16pt;">${signPosition}</p>
                    </div><div style="clear: both;"></div>`;
            } else {
                signatureHTML = `
                    <div class="page-break-element" style="margin-top: 45px; font-family: 'TH SarabunPSK'; color: black; float: right; width: 50%; text-align: left;">
                        <p style="margin: 0 0 50px 0; font-size: 16pt;">ขอแสดงความนับถือ</p>
                        <div style="text-align: center; width: 100%;">
                            <p style="margin: 0; font-size: 16pt;">( ${signName} )</p>
                            <p style="margin: 4px 0 0 0; font-size: 16pt;">${signPosition}</p>
                        </div>
                    </div><div style="clear: both;"></div>
                    <div class="page-break-element" style="margin-top: 30px; font-family: 'TH SarabunPSK'; color: black; text-align: left; font-size: 16pt; line-height: 1.2;">
                        <p style="margin: 0;">${fDeptMain} ${fDeptSub}</p>
                        <p style="margin: 0;">โทรศัพท์ ${phone} โทรสาร ${fax}</p>
                        <p style="margin: 0; font-size: 15pt;">ไปรษณีย์อิเล็กทรอนิกส์ ${fEmail}</p>
                    </div>`;
            }

            page1.innerHTML = `
                ${headerHTML}
                <div style="margin-top: 6mm;">
                    ${pHTML}
                </div>
                ${signatureHTML}
            `;
            container.appendChild(page1);
        }

        function triggerExportWord() {
            const filenameInput = document.getElementById('file-name-input').value || 'document';
            
            const docId = document.getElementById('data-doc-id').value;
            const docDate = document.getElementById('data-date').value;
            const subject = document.getElementById('data-subject').value;
            const learn = document.getElementById('data-learn').value;
            const through = document.getElementById('data-through').value;
            const dept = document.getElementById('data-dept').value;
            const phone = document.getElementById('data-phone').value;
            const fax = document.getElementById('data-fax').value;
            const ref = document.getElementById('data-ref').value;
            const attach = document.getElementById('data-attach').value;
            const signName = document.getElementById('data-sign-name').value;
            const signPosition = document.getElementById('data-sign-position').value;
            const fDeptMain = document.getElementById('footer-dept-main').value;
            const fDeptSub = document.getElementById('footer-dept-sub').value;
            const fEmail = document.getElementById('footer-email').value;

            let wordContent = '';

            if (currentDocumentMode === 'internal') {
                let throughRow = '';
                if(through.trim() !== '') {
                    throughRow = `<tr><td width="15%" style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">ผ่าน</td>
                                   <td width="85%" style="font-family:'TH SarabunPSK';font-size:16pt;vertical-align:top;">${through}</td></tr>`;
                }
                wordContent = `
                    <table border="0" cellspacing="0" cellpadding="0" width="100%" style="font-family:'TH SarabunPSK';">
                        <tr>
                            <td width="20%" style="vertical-align:top;">
                                <img src="${currentLogoUrl}" width="110" height="auto" />
                            </td>
                            <td width="80%" style="text-align:center; vertical-align:middle; padding-right:80px;">
                                <font size="6"><b>บันทึกข้อความ</b></font>
                            </td>
                        </tr>
                    </table>
                    <br/>
                    <table border="0" cellspacing="0" cellpadding="2" width="100%" style="font-family:'TH SarabunPSK'; border-bottom: 2px solid black;">
                        <tr>
                            <td colspan="2" style="font-size:16pt;">
                                <b>ส่วนงาน</b> ${dept} &nbsp;&nbsp;&nbsp;&nbsp;<b>โทร.</b> ${phone}
                            </td>
                        </tr>
                        <tr>
                            <td width="50%" style="font-size:16pt;"><b>ที่</b> ${docId}</td>
                            <td width="50%" style="font-size:16pt;"><b>วันที่</b> ${docDate}</td>
                        </tr>
                        <tr>
                            <td colspan="2" style="font-size:16pt;"><b>เรื่อง</b> ${subject}</td>
                        </tr>
                        <tr>
                            <td colspan="2" style="font-size:16pt;"><b>เรียน</b> ${learn}</td>
                        </tr>
                        ${throughRow}
                    </table>
                    <br/>
                `;
            } else {
                wordContent = `
                    <div style="text-align:center; width:100%; margin-bottom:15pt;">
                        <img src="${currentLogoUrl}" width="150" height="auto" style="margin: 0 auto;" />
                    </div>
                    <table border="0" cellspacing="0" cellpadding="2" width="100%">
                        <tr>
                            <td width="50%" style="font-family:'TH SarabunPSK';font-size:16pt;vertical-align:top;"><b>ที่</b> ${docId}</td>
                            <td width="50%" align="right" style="font-family:'TH SarabunPSK';font-size:16pt;text-align:right;">จุฬาลงกรณ์มหาวิทยาลัย<br>ถนนพญาไท กทม. 10330</td>
                        </tr>
                    </table>
                    <br/>
                    <table border="0" cellspacing="0" cellpadding="2" width="100%">
                        <tr>
                            <td width="50%"></td>
                            <td width="50%" style="font-family:'TH SarabunPSK';font-size:16pt;">${docDate}</td>
                        </tr>
                    </table>
                    <br/>
                    <table border="0" cellspacing="0" cellpadding="2" width="100%">
                        <tr><td width="15%" style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">เรื่อง</td><td width="85%" style="font-family:'TH SarabunPSK';font-size:16pt;">${subject}</td></tr>
                        <tr><td style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">เรียน</td><td style="font-family:'TH SarabunPSK';font-size:16pt;">${learn}</td></tr>
                        <tr><td style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">อ้างถึง</td><td style="font-family:'TH SarabunPSK';font-size:16pt;">${ref}</td></tr>
                        <tr><td style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">สิ่งที่ส่งมาด้วย</td><td style="font-family:'TH SarabunPSK';font-size:16pt;">${attach}</td></tr>
                    </table>
                    <br/>
                `;
            }

            textParagraphs.forEach(p => {
                wordContent += `<p style="font-family:'TH SarabunPSK';font-size:16pt;line-height:1.25;text-align:justify;text-justify:inter-character;text-indent:72pt;mso-char-indent-count:5.0;margin-bottom:16pt;">${p.text}</p>`;
            });

            if (currentDocumentMode === 'internal') {
                wordContent += `
                    <br/><br/>
                    <table border="0" cellspacing="0" cellpadding="0" width="100%">
                        <tr>
                            <td width="50%"></td>
                            <td width="50%" align="center" style="font-family:'TH SarabunPSK';font-size:16pt;text-align:center;">
                                ( ${signName} )<br/>
                                ${signPosition}
                            </td>
                        </tr>
                    </table>
                `;
            } else {
                wordContent += `
                    <br/>
                    <table border="0" cellspacing="0" cellpadding="0" width="100%">
                        <tr>
                            <td width="50%"></td>
                            <td width="50%" style="font-family:'TH SarabunPSK';font-size:16pt;text-align:left;padding-left:40px;">
                                ขอแสดงความนับถือ
                                <br/><br/><br/>
                                <div style="text-align:center; width:250px;">
                                    ( ${signName} )<br/>
                                    ${signPosition}
                                </div>
                            </td>
                        </tr>
                    </table>
                    <br/><br/>
                    <p style="font-family:'TH SarabunPSK';font-size:16pt;line-height:1.2;margin:0;">${fDeptMain} ${fDeptSub}</p>
                    <p style="font-family:'TH SarabunPSK';font-size:16pt;line-height:1.2;margin:0;">โทรศัพท์ ${phone} โทรสาร ${fax}</p>
                    <p style="font-family:'TH SarabunPSK';font-size:15pt;line-height:1.2;margin:0;">ไปรษณีย์อิเล็กทรอนิกส์ ${fEmail}</p>
                `;
            }

            const wordRawTemplate = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
            <head>
            <meta charset="utf-8">
            <title>ระบบจัดทำหนังสือราชการดิจิทัล</title>
            <style>
                @page Section1 {
                    size: 210mm 297mm;
                    margin: 25mm 20mm 20mm 30mm;
                    mso-header-margin: 36pt;
                    mso-footer-margin: 36pt;
                }
                div.Section1 { page: Section1; }
                body { font-family: 'TH SarabunPSK', 'Angsana New', sans-serif !important; }
            </style>
            </head>
            <body>
                <div class="Section1">
                    ${wordContent}
                </div>
            </body>
            </html>`;
            
            const blobData = new Blob(['\ufeff' + wordRawTemplate], { type: 'application/msword;charset=utf-8' });
            const blobUrl = URL.createObjectURL(blobData);
            const anchor = document.createElement('a');
            anchor.href = blobUrl;
            anchor.download = `${filenameInput}.doc`;
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
        }

        function triggerExportPDF() {
            const filenameInput = document.getElementById('file-name-input').value || 'document';
            const element = document.getElementById('page-render-area');
            
            const opt = {
                margin:       [0, 0, 0, 0], 
                filename:     `${filenameInput}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 2, useCORS: true, allowTaint: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        buildParagraphControls();
        changeMode('internal');
    </script>
</body>
</html>
