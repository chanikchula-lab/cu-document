        document.getElementById('logo-upload-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const statusEl = document.getElementById('upload-status');
            statusEl.classList.remove('hidden');
            statusEl.textContent = '⏳ กำลังอัปโหลดตราสัญลักษณ์ขึ้นระบบ...';
            statusEl.className = 'text-xs font-bold mt-1.5 text-amber-600';

            try {
                // ตั้งชื่อไฟล์โดยใส่ timestamp เพื่อไม่ให้ตั้งชื่อซ้ำกันในระบบ
                const fileExt = file.name.split('.').pop();
                const fileName = `logo_${Date.now()}.${fileExt}`;
                
                // สั่งอัปโหลดไฟล์ไปที่ Bucket ชื่อ 'logos' (ให้แน่ใจว่าคุณสร้าง Bucket นี้ใน Supabase และเซ็ตเป็น Public แล้ว)
                const { data, error } = await _supabase.storage
                    .from('logos')
                    .upload(fileName, file, {
                        cacheControl: '3600',
                        upsert: true
                    });

                if (error) throw error;

                // ดึง URL ลิงก์รูปภาพสาธารณะหลังจากอัปโหลดเสร็จเรียบร้อย
                const { data: { publicUrl } } = _supabase.storage
                    .from('logos')
                    .getPublicUrl(fileName);

                // เปลี่ยนค่ารูปตราในระบบเพื่อนำมาใช้งานทันที
                logoUrl = publicUrl;
                logoColorUrl = publicUrl;
                
                statusEl.textContent = '✅ อัปโหลดตราสัญลักษณ์และเชื่อมต่อสำเร็จ!';
                statusEl.className = 'text-xs font-bold mt-1.5 text-emerald-600';
                
                // รีโหลดโครงสร้างการแสดงผลกระดาษทันที
                processRealtimePreview();
            } catch (error) {
                console.error(error);
                statusEl.textContent = '❌ อัปโหลดไม่สำเร็จ: ' + error.message;
                statusEl.className = 'text-xs font-bold mt-1.5 text-red-600';
            }
        });

            const fieldsExternal = document.getElementById('wrapper-external-fields');

            if (modeSelection === 'internal') {

                btnExternal.className = "py-3 px-4 rounded-lg font-bold text-base transition text-slate-600 hover:text-slate-900 cursor-pointer";
                fieldsInternal.classList.remove('hidden');
                fieldsExternal.classList.add('hidden');

        function buildParagraphControls() {
            const container = document.getElementById('box-paragraphs-inputs');
            container.innerHTML = '';
            textParagraphs.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "space-y-1 bg-slate-50 p-3 rounded-lg border border-slate-200";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-slate-500">${item.label}</span>
                        ${index > 0 ? `<button onclick="removeParagraphField(${index})" class="text-xs text-red-500 hover:underline">ลบ</button>` : ''}
                    </div>
                    <textarea class="w-full border border-slate-300 rounded-lg p-2.5 text-base outline-none bg-white text-slate-800 h-24" oninput="updateParagraphText(${index}, this.value)">${item.text}</textarea>
                `;
                container.appendChild(div);
            });
        }

        function addNewParagraphField() {
            textParagraphs.push({ label: `ย่อหน้าที่ ${textParagraphs.length + 1}`, text: '' });
            buildParagraphControls();

        function removeParagraphField(index) {
            textParagraphs.splice(index, 1);
            textParagraphs.forEach((p, idx) => p.label = `ย่อหน้าที่ ${idx + 1}`);

            processRealtimePreview();

                            <p style="margin: 4px 0 0 0; font-size: 16pt;">${signPosition}</p>
                        </div>
                    </div><div style="clear: both;"></div>
                    <div class="page-break-element" style="margin-top: 30px; font-family: 'TH SarabunPSK'; color: black; text-align: left; font-size: 16pt; line-height: 1.2;">
                        <p style="margin: 0;">${fDeptMain} ${fDeptSub}</p>
                        <p style="margin: 0;">โทรศัพท์ ${phone} โทรสาร ${fax}</p>
                        <p style="margin: 0; font-size: 15pt;">ไปรษณีย์อิเล็กทรอนิกส์ ${fEmail}</p>
                    </div>`;
            }

            // รวบรวมข้อมูลให้อยู่ในผืนผ้าใบเดียวกัน โดยไม่บังคับขึ้นหน้าใหม่ล่วงหน้า
            page1.innerHTML = `
                ${headerHTML}
                <div style="margin-top: 6mm;">
                    ${pHTML}
                </div>
                ${signatureHTML}
            `;
            container.appendChild(page1);
        }

        function triggerExportWord() {
            const filenameInput = document.getElementById('file-name-input').value || 'document';
            
            // ดึงข้อมูลตัวแปรเพื่อง่ายต่อการแปะลงโครงสร้าง Word ดั้งเดิม
            const docId = document.getElementById('data-doc-id').value;
            const docDate = document.getElementById('data-date').value;
            const subject = document.getElementById('data-subject').value;
            const learn = document.getElementById('data-learn').value;
            const through = document.getElementById('data-through').value;
            const dept = document.getElementById('data-dept').value;
            const phone = document.getElementById('data-phone').value;
            const fax = document.getElementById('data-fax').value;
            const ref = document.getElementById('data-ref').value;
            const attach = document.getElementById('data-attach').value;
            const signName = document.getElementById('data-sign-name').value;
            const signPosition = document.getElementById('data-sign-position').value;
            const fDeptMain = document.getElementById('footer-dept-main').value;
            const fDeptSub = document.getElementById('footer-dept-sub').value;
            const fEmail = document.getElementById('footer-email').value;

            let wordContent = '';

            // ใช้ระบบจัดตารางแบบเก่าของ Word เพื่อไม่ให้ระยะเพี้ยน
            if (currentDocumentMode === 'internal') {
                let throughRow = '';
                if(through.trim() !== '') {
                    throughRow = `<tr><td width="15%" style="font-family:'TH SarabunPSK';font-size:20pt;font-weight:bold;vertical-align:top;">ผ่าน</td>
                                   <td width="85%" style="font-family:'TH SarabunPSK';font-size:16pt;vertical-align:top;">${through}</td></tr>`;
                }
                wordContent = `
                    <p align="center" style="text-align:center;margin-bottom:20pt;">
                        <font size="6" face="TH SarabunPSK"><b>บันทึกข้อความ</b></font>
                    </p>
                    <table border="0" cellspacing="0" cellpadding="2" width="100%">
                        <tr>
                            <td colspan="2" style="font-family:'TH SarabunPSK';font-size:16pt;">
                                <b>ส่วนงาน</b> ${dept} &nbsp;&nbsp;&nbsp;&nbsp;<b>โทร.</b> ${phone}
                            </td>
                        </tr>
                        <tr>
                            <td width="50%" style="font-family:'TH SarabunPSK';font-size:16pt;"><b>ที่</b> ${docId}</td>
                            <td width="50%" style="font-family:'TH SarabunPSK';font-size:16pt;"><b>วันที่</b> ${docDate}</td>
                        </tr>
                        <tr>
                            <td colspan="2" style="font-family:'TH SarabunPSK';font-size:16pt;"><b>เรื่อง</b> ${subject}</td>
                        </tr>
                        <tr>
                            <td colspan="2" style="font-family:'TH SarabunPSK';font-size:16pt;"><b>เรียน</b> ${learn}</td>
                        </tr>
                        ${throughRow}
                    </table>
                    <br/>
                `;
            } else {
                wordContent = `
                    <table border="0" cellspacing="0" cellpadding="2" width="100%">
                        <tr>
                            <td width="50%" style="font-family:'TH SarabunPSK';font-size:16pt;vertical-align:top;"><b>ที่</b> ${docId}</td>
                            <td width="50%" align="right" style="font-family:'TH SarabunPSK';font-size:16pt;text-align:right;">จุฬาลงกรณ์มหาวิทยาลัย<br>ถนนพญาไท กทม. 10330</td>
                        </tr>
                    </table>
                    <br/>
                    <table border="0" cellspacing="0" cellpadding="2" width="100%">
                        <tr>
                            <td width="50%"></td>
                            <td width="50%" style="font-family:'TH SarabunPSK';font-size:16pt;">${docDate}</td>
                        </tr>
                    </table>
                    <br/>
                    <table border="0" cellspacing="0" cellpadding="2" width="100%">
                        <tr><td width="15%" style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">เรื่อง</td><td width="85%" style="font-family:'TH SarabunPSK';font-size:16pt;">${subject}</td></tr>
                        <tr><td style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">เรียน</td><td style="font-family:'TH SarabunPSK';font-size:16pt;">${learn}</td></tr>
                        <tr><td style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">อ้างถึง</td><td style="font-family:'TH SarabunPSK';font-size:16pt;">${ref}</td></tr>
                        <tr><td style="font-family:'TH SarabunPSK';font-size:16pt;font-weight:bold;vertical-align:top;">สิ่งที่ส่งมาด้วย</td><td style="font-family:'TH SarabunPSK';font-size:16pt;">${attach}</td></tr>
                    </table>
                    <br/>
                `;
            }

            // ใส่แท็กย่อหน้า โดยใช้คำสั่ง mso-char-indent-count เพื่อควบคุมการย่อหน้า 2.5 ซม. ใน MS Word
            textParagraphs.forEach(p => {
                wordContent += `<p style="font-family:'TH SarabunPSK';font-size:16pt;line-height:1.25;text-align:justify;text-indent:72pt;mso-char-indent-count:5.0;margin-bottom:16pt;">${p.text}</p>`;
            });

            // ส่วนท้าย (คำลงท้าย / ผู้ลงนาม) สำหรับ MS Word
            if (currentDocumentMode === 'internal') {
                wordContent += `
                    <br/><br/>
                    <table border="0" cellspacing="0" cellpadding="0" width="100%">
                        <tr>
                            <td width="50%"></td>
                            <td width="50%" align="center" style="font-family:'TH SarabunPSK';font-size:16pt;text-align:center;">
                                ( ${signName} )<br/>
                                ${signPosition}
                            </td>
                        </tr>
                    </table>
                `;
            } else {
                wordContent += `
                    <br/>
                    <table border="0" cellspacing="0" cellpadding="0" width="100%">
                        <tr>
                            <td width="50%"></td>
                            <td width="50%" style="font-family:'TH SarabunPSK';font-size:16pt;text-align:left;padding-left:40px;">
                                ขอแสดงความนับถือ
                                <br/><br/><br/>
                                <div style="text-align:center; width:250px;">
                                    ( ${signName} )<br/>
                                    ${signPosition}
                                </div>
                            </td>
                        </tr>
                    </table>
                    <br/><br/>
                    <p style="font-family:'TH SarabunPSK';font-size:16pt;line-height:1.2;margin:0;">${fDeptMain} ${fDeptSub}</p>
                    <p style="font-family:'TH SarabunPSK';font-size:16pt;line-height:1.2;margin:0;">โทรศัพท์ ${phone} โทรสาร ${fax}</p>
                    <p style="font-family:'TH SarabunPSK';font-size:15pt;line-height:1.2;margin:0;">ไปรษณีย์อิเล็กทรอนิกส์ ${fEmail}</p>
                `;
            }

            const wordRawTemplate = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
            <head>
            <meta charset="utf-8">
            <title>ระบบจัดทำหนังสือราชการดิจิทัล</title>
            <style>
                @page Section1 {
                    size: 210mm 297mm;
                    margin: 25mm 20mm 20mm 30mm;
                    mso-header-margin: 36pt;
                    mso-footer-margin: 36pt;
                }
                div.Section1 { page: Section1; }
                body { font-family: 'TH SarabunPSK', 'Angsana New', sans-serif !important; }
            </style>
            </head>
            <body>
                <div class="Section1">
                    ${wordContent}
                </div>
            </body>
            </html>`;
            
            const blobData = new Blob(['\ufeff' + wordRawTemplate], { type: 'application/msword;charset=utf-8' });
            const blobUrl = URL.createObjectURL(blobData);
            const anchor = document.createElement('a');
            anchor.href = blobUrl;
            anchor.download = `${filenameInput}.doc`;
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
        }

        function triggerExportPDF() {
            const filenameInput = document.getElementById('file-name-input').value || 'document';
            const element = document.getElementById('preview-container');
            
            const opt = {
                margin:       [0, 0, 0, 0], 
                filename:     `${filenameInput}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 2, useCORS: true, allowTaint: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        buildParagraphControls();
        changeMode('internal');
    </script>
</body>
</html>
