<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดทำหนังสือราชการดิจิทัล - จุฬาลงกรณ์มหาวิทยาลัย (TH SarabunPSK 100%)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* โดดเด่นด้วยการโหลด Web Font TH SarabunPSK สำหรับการแสดงผลที่สมบูรณ์แบบ */
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap');
        
        @font-face {
            font-family: 'TH SarabunPSK';
            src: local('TH SarabunPSK'), local('THSarabunPSK'),
                 url('https://cdn.jsdelivr.net/gh/fontlw/font-th-sarabun/THSarabunPSK.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'TH SarabunPSK';
            src: local('TH SarabunPSK Bold'), local('THSarabunPSK-Bold'),
                 url('https://cdn.jsdelivr.net/gh/fontlw/font-th-sarabun/THSarabunPSK-Bold') format('woff');
            font-weight: bold;
            font-style: normal;
        }

        .cu-document-font {
            font-family: 'TH SarabunPSK', 'Sarabun', sans-serif !important;
        }

        /* จำลองสัดส่วนหน้ากระดาษ A4 ตั้งกั้นหน้าตามระเบียบงานสารบรรณ (ซ้าย 3 ซม. ขวา 2 ซม.) */
        .a4-sheet {
            width: 210mm;
            min-height: 297mm;
            padding-top: 25mm;
            padding-bottom: 25mm;
            padding-left: 30mm;
            padding-right: 20mm;
            background-color: white;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
            box-sizing: border-box;
            color: black;
            line-height: 1.25;
        }

        /* การจัดแนวข้อความในย่อหน้าหลักแบบกระจายตัวเสมอกัน (Thai Distributed) */
        .thai-justify {
            text-align: justify;
            text-justify: inter-character;
        }

        /* คลาสสไตล์ระเบียบขนาดอักษรสารบรรณ */
        .font-size-16 {
            font-size: 16pt !important;
            font-weight: normal !important;
        }

        .font-size-16-bold {
            font-size: 16pt !important;
            font-weight: bold !important;
        }
        
        .font-size-29-bold {
            font-size: 29pt !important;
            font-weight: bold !important;
        }
        
        /* ระยะย่อหน้าบรรทัดแรกเยื้อง 2.5 ซม. */
        .paragraph-indent {
            text-indent: 2.5cm !important;
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex flex-col antialiased text-slate-200 cu-document-font">

    <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-pink-600 flex items-center justify-center font-bold text-white shadow-sm">CU</div>
            <div>
                <h1 class="text-base font-bold tracking-wide text-white">ระบบเอกสารราชการจุฬาฯ (ตราพระเกี้ยวและฟอนต์แท้ 100%)</h1>
                <p class="text-xs text-slate-400">กำหนดกั้นขอบซ้าย 3 ซม. ขวา 2 ซม. / ย่อหน้า 2.5 ซม. / ขนาดฟอนต์ 29pt และ 16pt ตัวหนาตรงตามรูปแบบ</p>
            </div>
        </div>
        
        <div class="flex flex-wrap items-center gap-3">
            <div class="flex items-center bg-slate-900 border border-slate-700 rounded-lg px-3 py-1.5">
                <span class="text-xs font-semibold text-slate-400 mr-2">💾 ชื่อไฟล์:</span>
                <input type="text" id="file-name-input" value="หนังสือราชการ_จุฬาลงกรณ์" class="bg-transparent text-sm text-white font-medium outline-none w-52 focus:text-pink-400">
            </div>
            <button onclick="triggerExportWord()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg text-xs tracking-wider transition cursor-pointer">
                📝 ดาวน์โหลดไฟล์ Word (.doc)
            </button>
            <button onclick="triggerExportPDF()" class="bg-pink-600 hover:bg-pink-700 text-white font-semibold px-4 py-2 rounded-lg text-xs tracking-wider transition cursor-pointer">
                📄 ดาวน์โหลด PDF
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        
        <section class="w-full lg:w-[35%] p-5 overflow-y-auto bg-slate-100 text-slate-800 border-r border-slate-300 space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 mb-1.5">รูปแบบเอกสาร</label>
                <div class="grid grid-cols-2 gap-1 bg-slate-200 p-1 rounded-xl">
                    <button type="button" id="toggle-internal" onclick="changeMode('internal')" class="py-2 px-3 rounded-lg font-bold text-xs transition bg-white text-slate-800 shadow-xs">
                        บันทึกข้อความ (ภายใน)
                    </button>
                    <button type="button" id="toggle-external" onclick="changeMode('external')" class="py-2 px-3 rounded-lg font-bold text-xs transition text-slate-600 hover:text-slate-900">
                        หนังสือภายนอก
                    </button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-2xs space-y-3">
                <h3 class="text-xs font-bold text-slate-900 uppercase tracking-wide border-b border-slate-100 pb-1.5">
                    ข้อมูลหัวเรื่องเอกสาร
                </h3>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-0.5">ที่ (เลขที่หนังสือออก)</label>
                        <input type="text" id="data-doc-id" value="อว ๖๔/" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-0.5">วันที่</label>
                        <input type="text" id="data-date" value="มิถุนายน ๒๕๖๔" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                    </div>
                </div>

                <div id="wrapper-internal-fields" class="space-y-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-0.5">ส่วนงาน</label>
                        <input type="text" id="data-dept" value="คณะ..." oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-600 mb-0.5">โทรศัพท์</label>
                            <input type="text" id="data-phone" value="๐ ๐๐๐๐ ๐๐๐๐" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-600 mb-0.5">โทรสาร</label>
                            <input type="text" id="data-fax" value="๐ ๐๐๐๐ ๐๐๐๐" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-600 mb-0.5">เรื่อง</label>
                    <input type="text" id="data-subject" value="ขออนุมัติจัดโครงการสัมมนาเชิงปฏิบัติการ" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none font-semibold">
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-slate-600 mb-0.5">เรียน</label>
                    <input type="text" id="data-learn" value="คณบดีคณะ..." oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                </div>

                <div id="wrapper-external-fields" class="space-y-3 hidden">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-0.5">อ้างถึง</label>
                        <input type="text" id="data-ref" value="-" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-0.5">สิ่งที่ส่งมาด้วย</label>
                        <input type="text" id="data-attach" value="-" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-2xs space-y-3">
                <div class="flex justify-between items-center border-b border-slate-100 pb-1.5">
                    <h3 class="text-xs font-bold text-slate-900">บล็อกย่อหน้าเนื้อหา</h3>
                    <button type="button" onclick="appendParagraphRow()" class="text-[11px] font-bold bg-slate-100 text-slate-700 px-2 py-0.5 rounded-md border border-slate-300 hover:bg-slate-200 cursor-pointer">+ เพิ่มย่อหน้า</button>
                </div>
                <div id="box-paragraphs-inputs" class="space-y-2.5"></div>
            </div>

            <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-2xs space-y-3">
                <h3 class="text-xs font-bold text-slate-900 uppercase tracking-wide border-b border-slate-100 pb-1.5">ผู้ลงนามท้ายเอกสาร</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-0.5">ชื่อผู้ลงนาม (ในวงเล็บ)</label>
                        <input type="text" id="data-sign-name" value="ศาสตราจารย์ ดร.วิเลิศ ภูริวัช" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-600 mb-0.5">ตำแหน่ง</label>
                        <input type="text" id="data-sign-position" value="อธิการบดี" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-2 text-xs outline-none">
                    </div>
                </div>

                <div id="wrapper-external-footer" class="space-y-2 border-t border-slate-100 pt-2 hidden">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-600 mb-0.5">ชื่อส่วนงานหลัก</label>
                            <input type="text" id="footer-dept-main" value="จุฬาลงกรณ์มหาวิทยาลัย" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs outline-none">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-600 mb-0.5">ภาควิชา/กลุ่มภารกิจ</label>
                            <input type="text" id="footer-dept-sub" value="สำนักบริหารงาน..." oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-600 mb-0.5">โทรศัพท์</label>
                            <input type="text" id="footer-phone" value="๐ ๒๒๑๘ ๐๐๐๐" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs outline-none">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-600 mb-0.5">โทรสาร</label>
                            <input type="text" id="footer-fax" value="๐ ๒๒๑๘ ๐๐๐๐" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs outline-none">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-600 mb-0.5">อีเมล</label>
                            <input type="text" id="footer-email" value="chula@chula.ac.th" oninput="processRealtimePreview()" class="w-full border border-slate-300 rounded-lg p-1.5 text-xs outline-none">
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="w-full lg:w-[65%] bg-slate-600 p-6 flex justify-center overflow-y-auto">
            <div id="preview-area" class="a4-sheet cu-document-font text-black select-text"></div>
        </section>
    </main>

    <script>
        let currentDocumentMode = 'internal'; 

        let textParagraphs = [
            { text: 'ด้วย สำนักบริหารหลักสูตรและคณาจารย์ประจำจุฬาลงกรณ์มหาวิทยาลัย ได้รับนโยบายในการพัฒนาระบบเอกสารสารบรรณและการบริหารดิจิทัลครบวงจร ประจำปีการศึกษา ๒๕๖๙ เพื่อสร้างความสะดวกและความถูกต้องสอดคล้องตามระเบียบงานสารบรรณ' },
            { text: 'การนี้ เพื่อให้การดำเนินงานดังกล่าวเป็นไปด้วยความเรียบร้อยและมีประสิทธิภาพสูงสุด จึงใคร่ขออนุมัติจัดตั้งคณะทำงานและดำเนินโครงการสัมมนาเชิงปฏิบัติการตามรายละเอียดที่แนบมาพร้อมนี้' },
            { text: 'จึงเรียนมาเพื่อโปรดพิจารณาอนุมัติ' }
        ];

        // URL ตราพระเกี้ยวของแท้
        const realChulaLogoUrl = "https://upload.wikimedia.org/wikipedia/commons/e/e0/Phra_Kieo_Chula.png";

        function changeMode(modeSelection) {
            currentDocumentMode = modeSelection;
            const btnInternal = document.getElementById('toggle-internal');
            const btnExternal = document.getElementById('toggle-external');
            const fieldsInternal = document.getElementById('wrapper-internal-fields');
            const fieldsExternal = document.getElementById('wrapper-external-fields');
            const footerExternal = document.getElementById('wrapper-external-footer');

            if (modeSelection === 'internal') {
                btnInternal.className = "py-2 px-3 rounded-lg font-bold text-xs transition bg-white text-slate-800 shadow-xs";
                btnExternal.className = "py-2 px-3 rounded-lg font-bold text-xs transition text-slate-600 hover:text-slate-900";
                fieldsInternal.classList.remove('hidden');
                fieldsExternal.classList.add('hidden');
                footerExternal.classList.add('hidden');
            } else {
                btnInternal.className = "py-2 px-3 rounded-lg font-bold text-xs transition text-slate-600 hover:text-slate-900";
                btnExternal.className = "py-2 px-3 rounded-lg font-bold text-xs transition bg-white text-slate-800 shadow-xs";
                fieldsInternal.classList.add('hidden');
                fieldsExternal.classList.remove('hidden');
                footerExternal.classList.remove('hidden');
            }
            processRealtimePreview();
        }

        function buildParagraphControls() {
            const container = document.getElementById('box-paragraphs-inputs');
            container.innerHTML = '';
            textParagraphs.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex gap-2 items-start bg-slate-50 p-2 rounded-lg border border-slate-200";
                div.innerHTML = `
                    <span class="text-xs font-bold text-slate-400 mt-2">${index + 1}</span>
                    <textarea class="flex-1 border border-slate-300 rounded-lg p-1.5 text-xs outline-none bg-white text-slate-800 resize-none h-16" oninput="updateParagraphText(${index}, this.value)">${item.text}</textarea>
                    <button type="button" onclick="removeParagraphRow(${index})" class="text-red-500 hover:text-red-700 font-bold text-xs mt-2 cursor-pointer">🗑️</button>
                `;
                container.appendChild(div);
            });
        }

        function appendParagraphRow() {
            textParagraphs.push({ text: 'พิมพ์ข้อความย่อหน้าใหม่ที่นี่...' });
            buildParagraphControls();
            processRealtimePreview();
        }

        function removeParagraphRow(index) {
            if (textParagraphs.length <= 1) return;
            textParagraphs.splice(index, 1);
            buildParagraphControls();
            processRealtimePreview();
        }

        function updateParagraphText(index, value) {
            textParagraphs[index].text = value;
            processRealtimePreview();
        }

        // ฟังก์ชันสร้างโครงสร้างเอกสารราชการที่ถูกต้องตามระเบียบงานสารบรรณ (ลบเส้นคั่นออก, หัวข้อฟอร์มทั้งหมดเป็น 16pt ตัวหนา)
        function generateDocumentHTML(isForExport = false) {
            const docId = document.getElementById('data-doc-id').value;
            const docDate = document.getElementById('data-date').value;
            const subject = document.getElementById('data-subject').value;
            const learn = document.getElementById('data-learn').value;
            const dept = document.getElementById('data-dept').value;
            const phone = document.getElementById('data-phone').value;
            const fax = document.getElementById('data-fax').value;
            const ref = document.getElementById('data-ref').value;
            const attach = document.getElementById('data-attach').value;
            const signName = document.getElementById('data-sign-name').value;
            const signPosition = document.getElementById('data-sign-position').value;

            const fDeptMain = document.getElementById('footer-dept-main').value;
            const fDeptSub = document.getElementById('footer-dept-sub').value;
            const fPhone = document.getElementById('footer-phone').value;
            const fFax = document.getElementById('footer-fax').value;
            const fEmail = document.getElementById('footer-email').value;

            let mainContentHTML = '';
            textParagraphs.forEach(p => {
                mainContentHTML += `<p class="font-size-16 thai-justify paragraph-indent" style="margin-top: 0in; margin-bottom: 6pt; text-align: justify; text-justify: inter-character; text-indent: 2.5cm; font-family: 'TH SarabunPSK'; font-size: 16pt; font-weight: normal; line-height: 1.25;">${p.text}</p>`;
            });

            if (currentDocumentMode === 'internal') {
                // โหมดหนังสือภายใน (บันทึกข้อความ) -> ลบเส้นคั่นและ Borders ออกทั้งหมด, คำหลัก (ส่วนงาน, ที่, เรื่อง, เรียน, โทร, โทรสาร, วันที่) เป็น 16pt ตัวหนา
                return `
                    <div class="cu-document-font text-black" style="font-family: 'TH SarabunPSK'; color: black; line-height: 1.25;">
                        <div style="position: relative; width: 100%; min-height: 22mm; margin-bottom: 5mm;">
                            <img src="${realChulaLogoUrl}" style="position: absolute; left: 0; bottom: 0; height: 18mm; width: auto; filter: grayscale(100%); display: block;" />
                            <div class="font-size-29-bold" style="font-family: 'TH SarabunPSK'; font-size: 29pt; font-weight: bold; text-align: center; width: 100%; padding-top: 2mm;">บันทึกข้อความ</div>
                        </div>

                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 4mm; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                            <tr style="height: 26px;">
                                <td style="vertical-align: bottom; padding: 1px 0; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none; text-align: left;">
                                    <b style="font-weight: bold;">ส่วนงาน</b>&nbsp;&nbsp;${dept}
                                </td>
                                <td style="text-align: right; vertical-align: bottom; padding: 1px 0; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                                    <b style="font-weight: bold;">โทร.</b>&nbsp;${phone}&nbsp;&nbsp;<b style="font-weight: bold;">โทรสาร</b>&nbsp;${fax}
                                </td>
                            </tr>
                            <tr style="height: 26px;">
                                <td style="width: 55%; vertical-align: bottom; padding: 1px 0; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                                    <b style="font-weight: bold;">ที่</b>&nbsp;&nbsp;${docId}
                                </td>
                                <td style="width: 45%; text-align: left; padding-left: 12mm; vertical-align: bottom; padding: 1px 0; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                                    <b style="font-weight: bold;">วันที่</b>&nbsp;&nbsp;${docDate}
                                </td>
                            </tr>
                            <tr style="height: 26px;">
                                <td style="vertical-align: bottom; padding: 1px 0; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;" colspan="2">
                                    <b style="font-weight: bold;">เรื่อง</b>&nbsp;&nbsp;${subject}
                                </td>
                            </tr>
                            <tr style="height: 26px;">
                                <td style="vertical-align: bottom; padding: 1px 0; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;" colspan="2">
                                    <b style="font-weight: bold;">เรียน</b>&nbsp;&nbsp;${learn}
                                </td>
                            </tr>
                        </table>

                        <div style="margin-bottom: 25mm; min-height: 120mm; padding-top: 4mm;">
                            ${mainContentHTML}
                        </div>

                        <table style="width: 100%; border-collapse: collapse; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                            <tr>
                                <td style="width: 45%; border: none;"></td>
                                <td style="width: 55%; text-align: center; border: none;">
                                    <div style="height: 25px;"></div>
                                    <p style="margin: 0; font-weight: normal; font-size: 16pt;">( ${signName} )</p>
                                    <p style="margin: 4px 0 0 0; font-weight: normal; font-size: 16pt;">${signPosition}</p>
                                </td>
                            </tr>
                        </table>
                    </div>
                `;
            } else {
                // โหมดหนังสือภายนอก -> ตราพระเกี้ยวสีชมพูอยู่กึ่งกลางด้านบนสุด สูง 3 ซม. หัวฟอร์มเป็นตัวหนา 16pt ทั้งหมด
                return `
                    <div class="cu-document-font text-black" style="font-family: 'TH SarabunPSK'; color: black; line-height: 1.25;">
                        <div style="width: 100%; text-align: center; margin-bottom: 8mm;">
                            <img src="${realChulaLogoUrl}" style="height: 30mm; width: auto; margin: 0 auto; display: block;" />
                        </div>

                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 5mm; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                            <tr style="height: 26px;">
                                <td style="width: 50%; vertical-align: top; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                                    <b style="font-weight: bold;">ที่</b>&nbsp;&nbsp;${docId}
                                </td>
                                <td style="width: 50%; text-align: right; vertical-align: top; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none; font-weight: normal;">
                                    ${fDeptMain}<br>
                                    <span style="font-size: 16pt;">${fDeptSub}</span>
                                </td>
                            </tr>
                            <tr style="height: 26px;">
                                <td style="width: 50%; border: none;"></td>
                                <td style="width: 50%; text-align: left; padding-left: 30mm; vertical-align: bottom; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                                    ${docDate}
                                </td>
                            </tr>
                        </table>

                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 6mm; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;">
                            <tr style="height: 26px;">
                                <td style="width: 18%; vertical-align: top; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;"><b style="font-weight: bold;">เรื่อง</b></td>
                                <td style="width: 82%; vertical-align: top; font-weight: normal; font-size: 16pt; border: none;">${subject}</td>
                            </tr>
                            <tr style="height: 26px;">
                                <td style="vertical-align: top; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;"><b style="font-weight: bold;">เรียน</b></td>
                                <td style="vertical-align: top; font-weight: normal; font-size: 16pt; border: none;">${learn}</td>
                            </tr>
                            <tr style="height: 26px;">
                                <td style="vertical-align: top; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;"><b style="font-weight: bold;">อ้างถึง</b></td>
                                <td style="vertical-align: top; font-weight: normal; font-size: 16pt; border: none;">${ref}</td>
                            </tr>
                            <tr style="height: 26px;">
                                <td style="vertical-align: top; font-family: 'TH SarabunPSK'; font-size: 16pt; border: none;"><b style="font-weight: bold;">สิ่งที่ส่งมาด้วย</b></td>
                                <td style="vertical-align: top; font-weight: normal; font-size: 16pt; border: none;">${attach}</td>
                            </tr>
                        </table>

                        <div style="margin-bottom: 20mm; min-height: 100mm;">
                            ${mainContentHTML}
                        </div>

                        <table style="width: 100%; border-collapse: collapse; font-family: 'TH SarabunPSK'; font-size: 16pt; margin-bottom: 20px; border: none;">
                            <tr>
                                <td style="width: 40%; border: none;"></td>
                                <td style="width: 60%; text-align: left; padding-left: 20mm; border: none;">
                                    <p style="margin: 0 0 30px 0; font-weight: normal; font-size: 16pt;">ขอแสดงความนับถือ</p>
                                    <p style="margin: 0; text-align: center; font-weight: normal; font-size: 16pt;">( ${signName} )</p>
                                    <p style="margin: 4px 0 0 0; text-align: center; font-weight: normal; font-size: 16pt;">${signPosition}</p>
                                </td>
                            </tr>
                        </table>

                        <div style="font-family: 'TH SarabunPSK'; font-size: 14pt; color: #111; margin-top: 25mm; line-height: 1.2;">
                            <p style="margin: 0;">${fDeptSub}</p>
                            <p style="margin: 0;">โทรศัพท์ ${fPhone} โทรสาร ${fFax}</p>
                            <p style="margin: 0;">ไปรษณีย์อิเล็กทรอนิกส์ ${fEmail}</p>
                        </div>
                    </div>
                `;
            }
        }

        function processRealtimePreview() {
            const previewArea = document.getElementById('preview-area');
            previewArea.innerHTML = generateDocumentHTML(false);
        }

        // ล็อกขนาดและมิติกระดาษตอนแปลงเป็น PDF ให้คงสัดส่วน (ซ้าย 3 ซม. ขวา 2 ซม.) ไม่ให้ตัวอักษรเลื่อน
        function triggerExportPDF() {
            const filenameInput = document.getElementById('file-name-input').value || 'document';
            
            const wrapper = document.createElement('div');
            wrapper.style.width = '210mm';
            wrapper.style.minHeight = '297mm';
            wrapper.style.paddingTop = '25mm';
            wrapper.style.paddingBottom = '25mm';
            wrapper.style.paddingLeft = '30mm';
            wrapper.style.paddingRight = '20mm';
            wrapper.style.backgroundColor = 'white';
            wrapper.style.boxSizing = 'border-box';
            wrapper.style.position = 'absolute';
            wrapper.style.left = '-9999px';
            wrapper.innerHTML = generateDocumentHTML(true);
            document.body.appendChild(wrapper);

            const opt = {
                margin:       [0, 0, 0, 0], 
                filename:     `${filenameInput}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 3, useCORS: true, letterRendering: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(wrapper).save().then(() => {
                document.body.removeChild(wrapper);
            });
        }

        // ฝังรูปแบบโครงสร้างสำหรับ MS Word โดยเฉพาะ ล็อกกั้นขอบซ้าย 3 ซม. (1.18in) ขวา 2 ซม. (0.78in)
        function triggerExportWord() {
            const filenameInput = document.getElementById('file-name-input').value || 'document';
            const innerCode = generateDocumentHTML(true);
            
            const wordRawTemplate = `<!DOCTYPE html>
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head>
            <meta charset='utf-8'>
            <title>Chulalongkorn Document</title>
            <style>
                @page Section1 {
                    size: 8.27in 11.69in;
                    margin: 1.0in 0.78in 1.0in 1.18in; 
                    mso-header-margin: 0.5in;
                    mso-footer-margin: 0.5in;
                    mso-paper-source: 0;
                }
                div.Section1 { page: Section1; }
                body {
                    font-family: 'TH SarabunPSK', 'Sarabun', sans-serif;
                    font-size: 16pt;
                    color: black;
                }
                p, span, td, div, b {
                    font-family: 'TH SarabunPSK', 'Sarabun', sans-serif !important;
                }
                p {
                    margin: 0in;
                    margin-bottom: .0001pt;
                    text-align: justify;
                    text-justify: inter-character;
                    line-height: 1.25;
                    font-size: 16pt;
                }
                .font-size-16 { font-size: 16pt !important; font-weight: normal !important; }
                .font-size-16-bold { font-size: 16pt !important; font-weight: bold !important; }
                .font-size-29-bold { font-size: 29pt !important; font-weight: bold !important; }
                .paragraph-indent { text-indent: 2.5cm !important; }
            </style>
            </head>
            <body>
                <div class="Section1">
                    ${innerCode}
                </div>
            </body>
            </html>`;
            
            const blobData = new Blob(['\ufeff' + wordRawTemplate], {
                type: 'application/msword;charset=utf-8'
            });
            
            const blobUrl = URL.createObjectURL(blobData);
            const anchor = document.createElement('a');
            anchor.href = blobUrl;
            anchor.download = `${filenameInput}.doc`;
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
        }

        buildParagraphControls();
        changeMode('internal');
    </script>
</body>
</html>
